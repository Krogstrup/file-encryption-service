name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Auto-version and release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required: tag action needs full history to find previous tag

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch        # commits without feat/fix prefix → patch
          release_branches: main
          # Conventional commit mapping:
          #   fix:  / fix(...)!  → patch
          #   feat: / feat(...)! → minor
          #   BREAKING CHANGE    → major

      - name: Build release archive
        shell: pwsh
        run: |
          $version = '${{ steps.tag.outputs.new_tag }}'
          $archiveName = "file-encryption-service-$version.zip"

          Compress-Archive -Path @(
            'EncryptFile.ps1',
            'EncryptWith7Zip.cmd',
            'README.md',
            'UserGuide.md',
            'AdminGuide.md',
            'SecurityNotes.md',
            'CHANGELOG.md'
          ) -DestinationPath $archiveName

          Write-Host "Created $archiveName"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: file-encryption-service-${{ steps.tag.outputs.new_tag }}.zip
          fail_on_unmatched_files: true
